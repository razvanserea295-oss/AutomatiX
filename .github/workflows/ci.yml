name: CI

# Gate every change: typecheck (app + server), unit tests, and a real frontend
# build. Runs on PRs and pushes to the main branches so regressions (like a
# failing tsc) can't reach main undetected.
on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint — errors block, warnings capped)
        run: npm run lint

      - name: Type-check app (frontend)
        run: npx tsc --noEmit

      - name: Type-check server (must be 0 errors)
        run: npx tsc -p tsconfig.server.json --noEmit

      - name: Unit tests (+ coverage floor)
        run: npm run test:cov

      - name: Build frontend
        run: npx vite build

      - name: Compile server
        run: npx tsc -p tsconfig.server.json

      # Report-only: surfaces new high-severity advisories without blocking the
      # build. The known residual CVEs (xlsx, nodemailer, etc.) need breaking
      # major bumps — tracked in SECURITY.md, scheduled as a separate change set.
      - name: Audit production dependencies (non-blocking)
        run: npm audit --omit=dev --audit-level=high || true
