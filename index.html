<!DOCTYPE html>
<html lang="ro" data-density="compact">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Automatix" />
    <meta name="application-name" content="Automatix" />
    <meta name="theme-color" content="#16307A" />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/72/72-Regular-full.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/72/72-Semibold-full.woff2" crossorigin />
    <link rel="icon" type="image/svg+xml" href="/automatix-favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/pwa-192.png" />
    <title>automatiX</title>
    <style>
      /* ── Boot / splash screen ─────────────────────────────────────────── */
      #boot-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(ellipse at 50% 38%, #0E1526 0%, #070707 68%);
        font-family: '72', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        user-select: none;
        overflow: hidden;
      }
      /* thin top accent strip */
      #boot-screen::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 3px;
        background: linear-gradient(90deg, #16307A 0%, #4D86FF 48%, #16307A 100%);
      }
      #boot-logo {
        position: relative;
        margin-bottom: 32px;
      }
      /* ambient glow behind the icon */
      #boot-glow {
        position: absolute;
        inset: -32px;
        background: radial-gradient(circle, rgba(77,134,255,0.26) 0%, transparent 66%);
        border-radius: 50%;
        pointer-events: none;
        opacity: 0;
      }
      #boot-title {
        text-align: center;
      }
      #boot-product-name {
        font-size: 50px;
        font-weight: 200;
        color: #ECECEC;
        letter-spacing: -2px;
        line-height: 1;
      }
      #boot-divider {
        width: 40px;
        height: 2px;
        background: #4D86FF;
        margin: 16px auto 14px;
        opacity: 0.65;
      }
      #boot-subtitle {
        font-size: 11px;
        font-weight: 400;
        color: #555;
        letter-spacing: 2.2px;
        text-transform: uppercase;
      }
      #boot-version {
        font-size: 11px;
        color: #333;
        margin-top: 7px;
        letter-spacing: 0.5px;
      }
      /* bottom status + progress bar */
      #boot-bottom {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        padding: 0 24px 20px;
      }
      #boot-bottom-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 8px;
        gap: 16px;
      }
      #boot-status {
        font-size: 11px;
        color: #4A4A4A;
        font-family: '72', system-ui, sans-serif;
        letter-spacing: 0.01em;
      }
      #boot-copyright {
        font-size: 10px;
        color: #2E2E2E;
        font-family: '72', system-ui, sans-serif;
        letter-spacing: 0.02em;
      }
      #boot-bar-track {
        width: 100%;
        height: 2px;
        background: #141414;
        overflow: hidden;
      }
      #boot-bar {
        height: 100%;
        width: 36%;
        background: linear-gradient(90deg, #2D5BE3, #4D86FF);
      }

      /* ── Boot animation: hexagon draws in, nodes light up, name rises ── */
      #boot-screen.boot-exit {
        opacity: 0;
        transition: opacity 0.45s ease;
      }
      #boot-hex {
        stroke-dasharray: 300;
        stroke-dashoffset: 300;
        animation: boot-draw 1s ease forwards;
      }
      #boot-link {
        stroke-dasharray: 42;
        stroke-dashoffset: 42;
        animation: boot-draw 0.5s ease forwards 0.85s;
      }
      .boot-node {
        opacity: 0;
        transform-box: fill-box;
        transform-origin: center;
      }
      #boot-n1 { animation: boot-pop 0.4s ease forwards 1.15s; }
      #boot-n2 { animation: boot-pop 0.4s ease forwards 1.35s; }
      #boot-n3 { animation: boot-pop 0.4s ease forwards 1.55s; }
      #boot-glow { animation: boot-glow 1.6s ease forwards 0.5s; }
      #boot-title { opacity: 0; animation: boot-rise 0.6s ease forwards 1.45s; }
      @keyframes boot-draw { to { stroke-dashoffset: 0; } }
      @keyframes boot-pop {
        0% { opacity: 0; transform: scale(0.3); }
        60% { opacity: 1; transform: scale(1.25); }
        100% { opacity: 1; transform: scale(1); }
      }
      @keyframes boot-glow { from { opacity: 0; } to { opacity: 0.7; } }
      @keyframes boot-rise {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @media (prefers-reduced-motion: reduce) {
        #boot-hex, #boot-link, .boot-node, #boot-glow, #boot-title {
          animation: none !important;
          opacity: 1 !important;
          stroke-dashoffset: 0 !important;
        }
      }
    </style>
  </head>
  <body>

    <!-- ── Splash / boot screen (visible before React mounts) ─────────── -->
    <div id="boot-screen">

      <!-- icon with ambient glow -->
      <div id="boot-logo">
        <div id="boot-glow"></div>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="96" height="96" fill="none" aria-label="Automatix">
          <defs>
            <linearGradient id="bgf" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#5B9CFF"/>
              <stop offset="0.55" stop-color="#3FB0FF"/>
              <stop offset="1" stop-color="#27D3FF"/>
            </linearGradient>
          </defs>
          <path id="boot-hex" d="M50 8 L86.4 29 L86.4 71 L50 92 L13.6 71 L13.6 29 Z" stroke="url(#bgf)" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
          <path id="boot-link" d="M29 50 H71" stroke="url(#bgf)" stroke-width="5" stroke-linecap="round"/>
          <circle id="boot-n1" class="boot-node" cx="29" cy="50" r="7" stroke="url(#bgf)" stroke-width="5" fill="none"/>
          <circle id="boot-n2" class="boot-node" cx="50" cy="50" r="4.5" fill="url(#bgf)"/>
          <circle id="boot-n3" class="boot-node" cx="71" cy="50" r="6" fill="url(#bgf)"/>
        </svg>
      </div>

      <!-- product name -->
      <div id="boot-title">
        <div id="boot-product-name">automatiX</div>
        <div id="boot-divider"></div>
        <div id="boot-subtitle">Planificare Resurse Întreprindere</div>
        <div id="boot-version">v 1.1.7</div>
      </div>

      <!-- status + progress bar at bottom -->
      <div id="boot-bottom">
        <div id="boot-bottom-row">
          <span id="boot-status">Se încarcă…</span>
          <span id="boot-copyright">© 2026 Automatix</span>
        </div>
        <div id="boot-bar-track">
          <div id="boot-bar"></div>
        </div>
      </div>

    </div>
    <!-- ──────────────────────────────────────────────────────────────── -->

    <div id="root"></div>

    <!-- boot.js runs before the module bundle loads, sets up the listener -->
    <script src="/boot.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
