<!DOCTYPE html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Automatix" />
    <meta name="application-name" content="Automatix" />
    <meta name="theme-color" content="#16307A" />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/72/72-Regular-full.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/72/72-Semibold-full.woff2" crossorigin />
    <link rel="icon" type="image/svg+xml" href="/automatix-favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/pwa-192.png" />
    <title>automatiX</title>
    <style>
      /* ── Boot / splash screen ─────────────────────────────────────────── */
      #boot-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(ellipse at 50% 38%, #0E1526 0%, #070707 68%);
        font-family: '72', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        transition: opacity 0.5s ease;
        user-select: none;
        overflow: hidden;
      }
      /* thin top accent strip */
      #boot-screen::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 3px;
        background: linear-gradient(90deg, #16307A 0%, #4D86FF 48%, #16307A 100%);
      }
      /* logo wrapper — starts invisible/scaled down */
      #boot-logo {
        position: relative;
        opacity: 0;
        transform: scale(0.86);
        transition: opacity 0.44s ease, transform 0.44s cubic-bezier(0.34, 1.38, 0.64, 1);
        margin-bottom: 36px;
      }
      /* ambient glow behind the icon */
      #boot-glow {
        position: absolute;
        inset: -32px;
        background: radial-gradient(circle, rgba(77,134,255,0.26) 0%, transparent 66%);
        border-radius: 50%;
        pointer-events: none;
        animation: bootGlowPulse 2.8s ease-in-out infinite;
      }
      @keyframes bootGlowPulse {
        0%, 100% { opacity: 0.45; }
        50%       { opacity: 1;    }
      }
      /* product name + meta — starts invisible/shifted down */
      #boot-title {
        opacity: 0;
        transform: translateY(12px);
        transition: opacity 0.5s ease, transform 0.5s ease;
        text-align: center;
      }
      #boot-product-name {
        font-size: 50px;
        font-weight: 200;
        color: #ECECEC;
        letter-spacing: -2px;
        line-height: 1;
      }
      #boot-divider {
        width: 38px;
        height: 2px;
        background: #4D86FF;
        margin: 18px auto 15px;
        opacity: 0.65;
      }
      #boot-subtitle {
        font-size: 11px;
        font-weight: 400;
        color: #555;
        letter-spacing: 2.2px;
        text-transform: uppercase;
      }
      #boot-version {
        font-size: 11px;
        color: #333;
        margin-top: 7px;
        letter-spacing: 0.5px;
      }
      /* bottom status + progress bar */
      #boot-bottom {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        padding: 0 28px 16px;
      }
      #boot-bottom-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        margin-bottom: 9px;
      }
      #boot-status {
        font-size: 11px;
        color: #3C3C3C;
        font-family: system-ui, sans-serif;
        transition: color 0.4s ease;
      }
      #boot-copyright {
        font-size: 10px;
        color: #252525;
        font-family: system-ui, sans-serif;
      }
      #boot-bar-track {
        width: 100%;
        height: 2px;
        background: #141414;
        overflow: hidden;
      }
      #boot-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #2D5BE3, #4D86FF);
        transition: width 0.68s cubic-bezier(0.4, 0, 0.2, 1);
      }
    </style>
  </head>
  <body>

    <!-- ── Splash / boot screen (visible before React mounts) ─────────── -->
    <div id="boot-screen">

      <!-- icon with ambient glow -->
      <div id="boot-logo">
        <div id="boot-glow"></div>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="90" height="90">
          <defs>
            <linearGradient id="bgf" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#16307A"/>
              <stop offset="1" stop-color="#4D86FF"/>
            </linearGradient>
          </defs>
          <rect width="96" height="96" rx="18" fill="url(#bgf)"/>
          <g fill="#FFFFFF">
            <rect x="45" y="6" width="6" height="10" rx="3" transform="rotate(0 48 48)"/>
            <rect x="45" y="6" width="6" height="10" rx="3" transform="rotate(36 48 48)"/>
            <rect x="45" y="6" width="6" height="10" rx="3" transform="rotate(72 48 48)"/>
            <rect x="45" y="6" width="6" height="10" rx="3" transform="rotate(108 48 48)"/>
            <rect x="45" y="6" width="6" height="10" rx="3" transform="rotate(144 48 48)"/>
            <rect x="45" y="6" width="6" height="10" rx="3" transform="rotate(180 48 48)"/>
            <rect x="45" y="6" width="6" height="10" rx="3" transform="rotate(216 48 48)"/>
            <rect x="45" y="6" width="6" height="10" rx="3" transform="rotate(252 48 48)"/>
            <rect x="45" y="6" width="6" height="10" rx="3" transform="rotate(288 48 48)"/>
            <rect x="45" y="6" width="6" height="10" rx="3" transform="rotate(324 48 48)"/>
          </g>
          <circle cx="48" cy="48" r="33" fill="none" stroke="#FFFFFF" stroke-width="5.5"/>
          <path d="M39 63 L48 35 L57 63" fill="none" stroke="#FFFFFF" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M43.5 52 L52.5 52" stroke="#FFFFFF" stroke-width="6.5" stroke-linecap="round"/>
        </svg>
      </div>

      <!-- product name -->
      <div id="boot-title">
        <div id="boot-product-name">automatiX</div>
        <div id="boot-divider"></div>
        <div id="boot-subtitle">Planificare Resurse Întreprindere</div>
        <div id="boot-version">v 1.1.4</div>
      </div>

      <!-- status + progress bar at bottom -->
      <div id="boot-bottom">
        <div id="boot-bottom-row">
          <span id="boot-status">Se inițializează…</span>
          <span id="boot-copyright">© 2026 Automatix</span>
        </div>
        <div id="boot-bar-track">
          <div id="boot-bar"></div>
        </div>
      </div>

    </div>
    <!-- ──────────────────────────────────────────────────────────────── -->

    <div id="root"></div>

    <!-- boot.js runs before the module bundle loads, sets up the listener -->
    <script src="/boot.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
